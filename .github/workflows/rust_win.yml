name: Rust Windows

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:

    runs-on: windows-2025-vs2026

    steps:
    - name: Install Windows build-deps
      if: runner.os == 'windows'
      run: |
        pip3 install --break-system-packages --user tqdm lz4
        choco install ugrep

    - name: Checkout sources
      uses: actions/checkout@v5

    - name: Lint
      if: runner.os == 'windows2'
      run: |
       cargo fmt --all -- --check # cargo clippy --all-targets
    - name: Build Windows
      if: runner.os == 'windows'
      run: |
        cargo build --verbose --profile=reldeb --all
    - name: Checkout test data
      uses: actions/checkout@v5
      with:
        repository: ralovich/prc-db
        path: prc-db
    - name: Run whitebox tests
      if: runner.os == 'windows2'
      run: |
        cargo test --verbose --profile=reldeb
    - name: Run blackbox tests
      run: |
        cd prc-db/prcs
        echo "RUST_LOG=debug RUST_BACKTRACE=1 describe=../../target/reldeb/prc_describe INPUT=../../testdata/list_all.txt time ../../testdata/prc_describe_mt"
        $env:RUST_LOG="debug";
        $env:RUST_BACKTRACE="1";
        $env:describe="../../target/reldeb/prc_describe";
        $env:INPUT="../../testdata/list_all.txt";
        python3 ../../testdata/prc_describe_mt
    - name: Archive testing logs
      uses: actions/upload-artifact@v7
      with:
        name: testing-logs-${{runner.os}}
        path: |
          prc-db/prcs/globals_rs
          prc-db/prcs/tree_rs
          prc-db/prcs/tess_rs
          prc-db/prcs/geom_rs
          prc-db/prcs/ext_rs
          prc-db/prcs/mf_rs
          prc-db/prcs/review_summary.txt
