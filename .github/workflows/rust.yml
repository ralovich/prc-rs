name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5
    - name: Lint
      run: cargo fmt --all -- --check # cargo clippy --all-targets
    - name: Install Dependencies
      run: sudo apt update && sudo apt install lz4 ugrep colordiff python3-tqdm
    - name: Build
      run: |
        cargo build --verbose --profile=reldeb --all
        cargo build --verbose --profile=reldeb --tests
    - name: Checkout test data
      uses: actions/checkout@v5
      with:
        repository: ralovich/prc-db
        path: prc-db
    - name: Run whitebox tests
      run: |
        cargo test --verbose --profile=reldeb
    - name: Run blackbox tests
      run: |
        cd prc-db/prcs
        #describe=../../target/reldeb/prc_describe INPUT=../../testdata/list_all.txt ../../testdata/prc_describe
        echo "RUST_LOG=debug RUST_BACKTRACE=1 describe=../../target/reldeb/prc_describe INPUT=../../testdata/list_all.txt time ../../testdata/prc_describe_mt"
        RUST_LOG=debug RUST_BACKTRACE=1 describe=../../target/reldeb/prc_describe INPUT=../../testdata/list_all.txt time ../../testdata/prc_describe_mt
        echo "du -d 1 -h"
        du -d 1 -h
        echo "colordiff -u ../../testdata/expected_all.txt review_summary.txt"
        colordiff -u ../../testdata/expected_all.txt review_summary.txt
    - name: Archive testing logs
      uses: actions/upload-artifact@v7
      with:
        name: testing-logs
        path: |
          prc-db/prcs/globals_rs
          prc-db/prcs/tree_rs
          prc-db/prcs/tess_rs
          prc-db/prcs/geom_rs
          prc-db/prcs/ext_rs
          prc-db/prcs/review_summary.txt
